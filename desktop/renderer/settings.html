<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src *; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div class="head">
      <span class="title">摸鱼看书 · 设置</span>
      <button class="x" id="close">✕</button>
    </div>
    <div class="body">
      <h4>外观</h4>
      <div class="row"><label>背景色</label><input type="color" id="bg" /><span style="flex:1"></span></div>
      <div class="row"><label>文字色</label><input type="color" id="fg" /><span style="flex:1"></span></div>
      <div class="row"><label>字号</label><input type="range" id="fontSize" min="10" max="28" /><span class="val" id="fontSizeV"></span></div>
      <div class="row"><label>行距</label><input type="range" id="lineHeight" min="1.2" max="2.4" step="0.1" /><span class="val" id="lineHeightV"></span></div>
      <div class="row"><label>框宽度</label><input type="range" id="winWidth" min="300" max="1600" step="10" /><span class="val" id="winWidthV"></span></div>
      <div class="row"><label>框高度</label><input type="range" id="winHeight" min="20" max="160" step="2" /><span class="val" id="winHeightV"></span></div>
      <p class="hint">拖动窗口只移动位置，不会变大；框的大小在这里用滑块调，字号不变、文字自动重排。</p>
      <div class="row"><label>透明度</label><input type="range" id="opacity" min="0.3" max="1" step="0.05" /><span class="val" id="opacityV"></span></div>
      <div class="row">
        <label>字体</label>
        <select id="fontFamily">
          <option value="Consolas, 'Cascadia Code', 'Microsoft YaHei', monospace">Consolas（等宽·像代码）</option>
          <option value="'Cascadia Mono', Consolas, monospace">Cascadia Mono</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
          <option value="'SimSun', serif">宋体</option>
          <option value="'KaiTi', serif">楷体</option>
        </select>
      </div>

      <h4>多端同步</h4>
      <p class="hint">手机网页端与本端已自动同一份进度，无需再填同步码。服务器地址一般不用改。</p>
      <div class="row"><label>服务器</label><input type="text" id="serverUrl" placeholder="http://123.57.90.23:8787" /></div>

      <h4>章节目录</h4>
      <input type="text" id="search" placeholder="输入关键词或章号筛选…" />
      <div class="list" id="toc"></div>
    </div>
    <script type="module" src="settings.js"></script>
  </body>
</html>
