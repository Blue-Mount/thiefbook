# Fly.io 部署配置。首次部署：fly launch --copy-config --no-deploy 后按需改 app 名，再 fly deploy
app = "thiefbook-sync"
primary_region = "hkg"   # 香港节点，离国内近

[build]

[env]
  DATA_DIR = "/data"
  STATIC_DIR = "/srv/public-dist"

# 持久化卷：阅读进度存这里，重启/重新部署不丢
[[mounts]]
  source = "thiefbook_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # 无人访问时休眠，个人用免费额度足够

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
